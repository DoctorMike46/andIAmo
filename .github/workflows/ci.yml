name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        # Using imresamu's combined image which provides PostGIS + pgvector.
        # If unreliable in CI, switch to a custom build step that compiles
        # pgvector on top of postgis/postgis (slower).
        image: imresamu/postgis-pgvector:16-3.4-0.7.4
        env:
          POSTGRES_USER: andiamo
          POSTGRES_PASSWORD: andiamo
          POSTGRES_DB: andiamo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U andiamo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen || uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy app
        continue-on-error: true  # tighten in Fase 1 once models exist

      - name: Run migrations
        env:
          APP_SECRET_KEY: test-secret-test-secret-test-secret
          JWT_SECRET: test-jwt-secret-test-jwt-secret
          DATABASE_URL: postgresql+asyncpg://andiamo:andiamo@localhost:5432/andiamo_test
          DATABASE_URL_SYNC: postgresql+psycopg://andiamo:andiamo@localhost:5432/andiamo_test
        run: uv run alembic upgrade head

      - name: Tests
        env:
          APP_SECRET_KEY: test-secret-test-secret-test-secret
          JWT_SECRET: test-jwt-secret-test-jwt-secret
          DATABASE_URL: postgresql+asyncpg://andiamo:andiamo@localhost:5432/andiamo_test
          DATABASE_URL_SYNC: postgresql+psycopg://andiamo:andiamo@localhost:5432/andiamo_test
        run: uv run pytest --cov=app --cov-report=term-missing

  mobile:
    name: Mobile (analyze + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
