name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (smoke)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Postgres image (PostGIS + pgvector)
        run: docker build -t andiamo-pg infra/postgres

      - name: Start Postgres
        run: |
          docker run -d --name pg \
            -e POSTGRES_USER=andiamo \
            -e POSTGRES_PASSWORD=andiamo \
            -e POSTGRES_DB=andiamo_test \
            -p 5432:5432 \
            andiamo-pg

          for i in $(seq 1 30); do
            if docker exec pg pg_isready -U andiamo -d andiamo_test >/dev/null 2>&1; then
              echo "postgres ready"
              exit 0
            fi
            sleep 2
          done
          echo "postgres did not become ready in time"
          docker logs pg
          exit 1

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Apply migrations
        working-directory: backend
        env:
          APP_SECRET_KEY: test-secret-test-secret-test-secret
          JWT_SECRET: test-jwt-secret-test-jwt-secret
          DATABASE_URL: postgresql+asyncpg://andiamo:andiamo@localhost:5432/andiamo_test
          DATABASE_URL_SYNC: postgresql+psycopg://andiamo:andiamo@localhost:5432/andiamo_test
        run: uv run alembic upgrade head

      - name: Lint (ruff, advisory)
        working-directory: backend
        run: uv run ruff check . || true

  mobile:
    name: Mobile (smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Analyze (advisory)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true
