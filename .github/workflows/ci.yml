name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: imresamu/postgis-pgvector:16-3.4-0.7.4
        env:
          POSTGRES_USER: andiamo
          POSTGRES_PASSWORD: andiamo
          POSTGRES_DB: andiamo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U andiamo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Apply migrations
        env:
          APP_SECRET_KEY: test-secret-test-secret-test-secret
          JWT_SECRET: test-jwt-secret-test-jwt-secret
          DATABASE_URL: postgresql+asyncpg://andiamo:andiamo@localhost:5432/andiamo_test
          DATABASE_URL_SYNC: postgresql+psycopg://andiamo:andiamo@localhost:5432/andiamo_test
        run: uv run alembic upgrade head

      - name: Lint (ruff, advisory)
        run: uv run ruff check . || true

  mobile:
    name: Mobile (smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Analyze (advisory)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true
